name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Run lint
        working-directory: dazki
        run: ./gradlew :api:lint :hidden-api-stubs:lint :manager:lint :sample:lint --no-daemon --console=plain

      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          path: |
            dazki/api/build/reports/lint-results-debug.html
            dazki/hidden-api-stubs/build/reports/lint-results-debug.html
            dazki/manager/build/reports/lint-results-debug.html
            dazki/sample/build/reports/lint-results-debug.html
          if-no-files-found: ignore
