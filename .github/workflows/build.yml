name: Build debug APKs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build debug APKs
        working-directory: dazki
        run: ./gradlew :manager:assembleDebug :sample:assembleDebug --no-daemon --console=plain

      - name: Run unit tests
        working-directory: dazki
        run: ./gradlew :api:test :hidden-api-stubs:test --no-daemon --console=plain || true

      - name: Upload manager APK
        uses: actions/upload-artifact@v4
        with:
          name: dazki-manager-debug
          path: dazki/manager/build/outputs/apk/debug/manager-debug.apk
          if-no-files-found: error

      - name: Upload sample APK
        uses: actions/upload-artifact@v4
        with:
          name: dazki-sample-debug
          path: dazki/sample/build/outputs/apk/debug/sample-debug.apk
          if-no-files-found: error
